workflows:
  ios-distribution:
    name: STATE iOS Distribution
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.0.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
        - ios_signing
      vars:
        APP_ROOT: heartfelt-check-in-main
        ARCHIVE_PATH: /tmp/App.xcarchive
        EXPORT_PATH: /tmp/ipa-export

    scripts:

      - name: Install dependencies
        script: |
          cd $APP_ROOT
          npm install
          npm install @capacitor/cli@^8.1.0 @capacitor/core@^8.1.0 @capacitor/ios@^8.1.0
          echo "✅ @capacitor/ios installed:"
          ls node_modules/@capacitor/ios/scripts/pods_helpers.rb

      - name: Build web app
        script: |
          cd $APP_ROOT
          npm run build
          echo "✅ dist/ contents:"
          ls -la dist/
          test -f dist/index.html || (echo "❌ FATAL: dist/index.html missing" && exit 1)

      - name: Sync iOS
        script: |
          cd $APP_ROOT
          NM="$(pwd)/node_modules"
          PODFILE="ios/App/Podfile"
          sed -i '' \
            "s|require_relative '\.\./\.\./\.\./node_modules|require_relative '${NM}|g; \
             s|require_relative '\.\./\.\./node_modules|require_relative '${NM}|g; \
             s|:path => '\.\./\.\./\.\./node_modules|:path => '${NM}|g; \
             s|:path => '\.\./\.\./node_modules|:path => '${NM}|g" \
            "$PODFILE"
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" "$PODFILE"
          echo "✅ Podfile head:"
          head -5 "$PODFILE"
          npx cap copy ios
          echo "✅ iOS public folder:"
          ls -la ios/App/App/public/
          test -f ios/App/App/public/index.html || (echo "❌ FATAL: index.html missing" && exit 1)
          cd ios/App
          pod install --repo-update
          echo "✅ Pod install complete"

      - name: Fix deployment target in Xcode project
        script: |
          cd $APP_ROOT
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/ASSETCATALOG_COMPILER_APPICON_NAME = [^;]*;/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' ios/App/App.xcodeproj/project.pbxproj
          echo "✅ Deployment targets:"
          grep "IPHONEOS_DEPLOYMENT_TARGET" ios/App/App.xcodeproj/project.pbxproj | head -4
          echo "✅ AppIcon:"
          grep "ASSETCATALOG_COMPILER_APPICON_NAME" ios/App/App.xcodeproj/project.pbxproj
          echo "✅ Code sign style:"
          grep "CODE_SIGN_STYLE" ios/App/App.xcodeproj/project.pbxproj | head -4

      - name: Set up code signing
        script: |
          keychain initialize
          python3 -c "import os; k=os.environ.get('ASC_PRIVATE_KEY',''); k=k.replace('\\n','\n') if '\\n' in k else k; open('/tmp/asc_key.p8','w').write(k+'\n' if not k.endswith('\n') else k); print('Key written:',len(k),'bytes'); print('First line:',k.split('\n')[0])"
          chmod 600 /tmp/asc_key.p8

      - name: Set build number
        script: |
          cd $APP_ROOT/ios/App
          agvtool new-version -all $BUILD_NUMBER
          echo "✅ Build number: $BUILD_NUMBER"

      - name: Build iOS
        script: |
          set -e
          cd $APP_ROOT/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID 3XD237L64Y \
            -authenticationKeyIssuerID 792a7c6b-188d-4d18-a896-14c60eaa6c0f \
            DEVELOPMENT_TEAM=83U7FNH93D \
            CODE_SIGN_STYLE=Automatic \
            ONLY_ACTIVE_ARCH=NO \
            clean archive 2>&1
          echo "✅ Verifying archive:"
          ls -la "$ARCHIVE_PATH" || (echo "❌ Archive not created!" && exit 1)
          echo "✅ Web assets in archive:"
          find "$ARCHIVE_PATH" -name "index.html" 2>/dev/null || echo "⚠️ index.html NOT found — blank screen will occur"
          echo "✅ Icons in archive:"
          find "$ARCHIVE_PATH" -name "*.png" 2>/dev/null | grep -i icon | head -5

      - name: Export IPA
        script: |
          set -e
          PLIST_PATH="$CM_BUILD_DIR/$APP_ROOT/ios/App/ExportOptions.plist"
          ls -la "$ARCHIVE_PATH" || (echo "❌ Archive not found!" && exit 1)
          ls -la "$PLIST_PATH" || (echo "❌ ExportOptions.plist not found!" && exit 1)
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$PLIST_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID 3XD237L64Y \
            -authenticationKeyIssuerID 792a7c6b-188d-4d18-a896-14c60eaa6c0f
          echo "✅ IPA exported:"
          ls -la "$EXPORT_PATH/"

    artifacts:
      - /tmp/ipa-export/*.ipa
      - /tmp/App.xcarchive/**

    publishing:
      app_store_connect:
        api_key: $ASC_PRIVATE_KEY
        key_id: $ASC_KEY_ID
        issuer_id: $ASC_KEY_ISSUER_ID
        submit_to_testflight: true
