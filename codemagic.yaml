workflows:
  ios-distribution:
    name: STATE iOS Distribution
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.0.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
        - ios_signing
      vars:
        APP_ROOT: heartfelt-check-in-main

    scripts:

      # ─── 1. Install JS dependencies ───────────────────────────────────────
      - name: Install dependencies
        script: |
          cd $APP_ROOT
          npm install
          npm install @capacitor/cli@^8.1.0 @capacitor/core@^8.1.0 @capacitor/ios@^8.1.0
          echo "✅ @capacitor/ios installed at:"
          ls node_modules/@capacitor/ios/scripts/pods_helpers.rb

      # ─── 2. Build web assets ──────────────────────────────────────────────
      - name: Build web app
        script: |
          cd $APP_ROOT
          npm run build
          echo "✅ dist/ contents:"
          ls -la dist/
          test -f dist/index.html || (echo "❌ FATAL: dist/index.html missing" && exit 1)

      # ─── 3. Sync iOS ──────────────────────────────────────────────────────
      - name: Sync iOS
        script: |
          cd $APP_ROOT

          NM="$(pwd)/node_modules"
          echo "✅ Patching Podfile with node_modules at: $NM"
          PODFILE="ios/App/Podfile"

          sed -i '' \
            "s|require_relative '\.\./\.\./\.\./node_modules|require_relative '${NM}|g; \
             s|require_relative '\.\./\.\./node_modules|require_relative '${NM}|g; \
             s|:path => '\.\./\.\./\.\./node_modules|:path => '${NM}|g; \
             s|:path => '\.\./\.\./node_modules|:path => '${NM}|g" \
            "$PODFILE"

          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" "$PODFILE"

          echo "✅ Podfile first 5 lines after patch:"
          head -5 "$PODFILE"

          npx cap copy ios

          echo "✅ iOS public folder after cap copy:"
          ls -la ios/App/App/public/
          test -f ios/App/App/public/index.html || \
            (echo "❌ FATAL: ios/App/App/public/index.html missing after cap copy" && exit 1)

          cd ios/App
          pod install --repo-update
          echo "✅ Pod install complete"

      # ─── 4. Fix deployment target in Xcode project ────────────────────────
      - name: Fix deployment target in Xcode project
        script: |
          cd $APP_ROOT
          sed -i '' \
            's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' \
            ios/App/App.xcodeproj/project.pbxproj

          sed -i '' \
            's/ASSETCATALOG_COMPILER_APPICON_NAME = [^;]*;/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;/g' \
            ios/App/App.xcodeproj/project.pbxproj

          echo "✅ Deployment targets:"
          grep "IPHONEOS_DEPLOYMENT_TARGET" ios/App/App.xcodeproj/project.pbxproj | head -4

          echo "✅ AppIcon setting:"
          grep "ASSETCATALOG_COMPILER_APPICON_NAME" ios/App/App.xcodeproj/project.pbxproj

          echo "✅ Icon files on disk:"
          ls ios/App/App/Assets.xcassets/AppIcon.appiconset/*.png | wc -l

      # ─── 5. Set up code signing ───────────────────────────────────────────
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.knightleeron.state \
            --type IOS_APP_STORE \
            --issuer-id "$ASC_KEY_ISSUER_ID" \
            --key-id "$ASC_KEY_ID" \
            --private-key "$ASC_PRIVATE_KEY" \
            --create
          xcode-project use-profiles

      # ─── 6. Set build number ──────────────────────────────────────────────
      - name: Set build number
        script: |
          cd $APP_ROOT/ios/App
          agvtool new-version -all $BUILD_NUMBER
          echo "✅ Build number: $BUILD_NUMBER"

      # ─── 7. Build iOS archive ─────────────────────────────────────────────
      - name: Build iOS
        script: |
          cd $APP_ROOT/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=83U7FNH93D \
            clean archive \
            | xcpretty --color && exit ${PIPESTATUS[0]}

          echo "✅ Confirming web assets in archive:"
          find $CM_BUILD_DIR/App.xcarchive -name "index.html" 2>/dev/null || \
            echo "⚠️ index.html NOT found in archive — blank screen will occur"

          echo "✅ Confirming icons in archive:"
          find $CM_BUILD_DIR/App.xcarchive -name "*.png" 2>/dev/null | grep -i icon | head -5

      # ─── 8. Export IPA ────────────────────────────────────────────────────
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportPath $CM_BUILD_DIR/export \
            -exportOptionsPlist "$CM_BUILD_DIR/../../$APP_ROOT/ios/App/ExportOptions.plist"

          echo "✅ IPA exported:"
          ls -la $CM_BUILD_DIR/export/

    artifacts:
      - $CM_BUILD_DIR/export/*.ipa
      - $CM_BUILD_DIR/App.xcarchive/**

    publishing:
      app_store_connect:
        api_key: $ASC_PRIVATE_KEY
        key_id: $ASC_KEY_ID
        issuer_id: $ASC_KEY_ISSUER_ID
        submit_to_testflight: true
