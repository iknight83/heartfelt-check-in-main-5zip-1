#!/usr/bin/env bash

set -e
cd $APP_ROOT/ios/App

xcodebuild \
  -workspace App.xcworkspace \
  -scheme App \
  -configuration Release \
  -destination "generic/platform=iOS" \
  -archivePath "$ARCHIVE_PATH" \
  DEVELOPMENT_TEAM=83U7FNH93D \
  ONLY_ACTIVE_ARCH=NO \
  clean archive 2>&1

echo "✅ Verifying archive:"
ls -la "$ARCHIVE_PATH" || (echo "❌ Archive not created!" && exit 1)

echo "✅ Web assets in archive:"
find "$ARCHIVE_PATH" -name "index.html" 2>/dev/null || \
  echo "⚠️ index.html NOT found — blank screen will occur"

echo "✅ Icons in archive:"
find "$ARCHIVE_PATH" -name "*.png" 2>/dev/null | grep -i icon | head -5
