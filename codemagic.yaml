workflows:
  ios-distribution:
    name: STATE iOS Distribution
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.0.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      vars:
        APP_ROOT: heartfelt-check-in-main
        ARCHIVE_PATH: /tmp/App.xcarchive
        EXPORT_PATH: /tmp/ipa-export

    scripts:

      - name: Install dependencies
        script: |
          cd $APP_ROOT
          npm install
          npm install @capacitor/cli@^8.1.0 @capacitor/core@^8.1.0 @capacitor/ios@^8.1.0
          ls node_modules/@capacitor/ios/scripts/pods_helpers.rb

      - name: Build web app
        script: |
          cd $APP_ROOT
          npm run build
          ls -la dist/
          test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)

      - name: Sync iOS
        script: |
          cd $APP_ROOT
          NM="$(pwd)/node_modules"
          PODFILE="ios/App/Podfile"
          sed -i '' \
            "s|require_relative '\.\./\.\./\.\./node_modules|require_relative '${NM}|g; \
             s|require_relative '\.\./\.\./node_modules|require_relative '${NM}|g; \
             s|:path => '\.\./\.\./\.\./node_modules|:path => '${NM}|g; \
             s|:path => '\.\./\.\./node_modules|:path => '${NM}|g" \
            "$PODFILE"
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" "$PODFILE"
          npx cap copy ios
          test -f ios/App/App/public/index.html || (echo "❌ index.html missing" && exit 1)
          echo "✅ Web assets copied"
          cd ios/App
          pod install --repo-update

      - name: Fix Xcode project settings
        script: |
          cd $APP_ROOT
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/ASSETCATALOG_COMPILER_APPICON_NAME = [^;]*;/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' ios/App/App.xcodeproj/project.pbxproj
          grep "CODE_SIGN_STYLE" ios/App/App.xcodeproj/project.pbxproj | head -4

      - name: Set up code signing
        script: |
          keychain initialize

          # Import distribution certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/dist_cert.p12
          keychain add-certificates \
            --certificate /tmp/dist_cert.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          echo "✅ Certificate imported"

          # Install provisioning profile
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$PROFILES_DIR/state_appstore.mobileprovision"
          echo "✅ Profile installed"

          echo "=== Certificates in keychain ==="
          security find-identity -v -p codesigning 2>/dev/null | head -10

          echo "=== Profile on disk ==="
          ls -la "$PROFILES_DIR/"

          xcode-project use-profiles
          echo "✅ Signing configured"

      - name: Set build number
        script: |
          cd $APP_ROOT/ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build iOS
        script: |
          set -e
          cd $APP_ROOT/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM=83U7FNH93D \
            ONLY_ACTIVE_ARCH=NO \
            clean archive 2>&1
          echo "✅ Archive exists:"
          ls -la "$ARCHIVE_PATH" || (echo "❌ Archive not created!" && exit 1)
          echo "✅ Web assets in archive:"
          find "$ARCHIVE_PATH" -name "index.html" 2>/dev/null || echo "⚠️ index.html NOT found!"
          echo "✅ JS files in archive:"
          find "$ARCHIVE_PATH" -path "*/public/assets/*.js" 2>/dev/null | head -5 || echo "⚠️ NO JS FILES IN ARCHIVE"
          echo "✅ All public files:"
          find "$ARCHIVE_PATH" -path "*/App.app/public*" -type f 2>/dev/null | head -20
          echo "✅ Icons in archive:"
          find "$ARCHIVE_PATH" -name "*.png" 2>/dev/null | grep -i icon | head -5

      - name: Export IPA
        script: |
          set -e
          PLIST_PATH="$CM_BUILD_DIR/$APP_ROOT/ios/App/ExportOptions.plist"
          ls -la "$ARCHIVE_PATH" || (echo "❌ Archive not found!" && exit 1)
          ls -la "$PLIST_PATH" || (echo "❌ ExportOptions.plist not found!" && exit 1)
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$PLIST_PATH"
          echo "✅ IPA exported:"
          ls -la "$EXPORT_PATH/"

    artifacts:
      - /tmp/ipa-export/*.ipa
      - /tmp/App.xcarchive/**

    publishing:
      app_store_connect:
        api_key: $ASC_PRIVATE_KEY
        key_id: $ASC_KEY_ID
        issuer_id: $ASC_KEY_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
