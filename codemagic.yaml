workflows:
  ios-distribution:
    name: STATE iOS Distribution
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.0.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
        - ios_signing
      vars:
        APP_ROOT: heartfelt-check-in-main
        ARCHIVE_PATH: /tmp/App.xcarchive
        EXPORT_PATH: /tmp/ipa-export

    scripts:

      - name: Install dependencies
        script: |
          cd $APP_ROOT
          npm install
          npm install @capacitor/cli@^8.1.0 @capacitor/core@^8.1.0 @capacitor/ios@^8.1.0
          ls node_modules/@capacitor/ios/scripts/pods_helpers.rb

      - name: Build web app
        script: |
          cd $APP_ROOT
          npm run build
          ls -la dist/
          test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)

      - name: Sync iOS
        script: |
          cd $APP_ROOT
          NM="$(pwd)/node_modules"
          PODFILE="ios/App/Podfile"
          sed -i '' \
            "s|require_relative '\.\./\.\./\.\./node_modules|require_relative '${NM}|g; \
             s|require_relative '\.\./\.\./node_modules|require_relative '${NM}|g; \
             s|:path => '\.\./\.\./\.\./node_modules|:path => '${NM}|g; \
             s|:path => '\.\./\.\./node_modules|:path => '${NM}|g" \
            "$PODFILE"
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" "$PODFILE"
          npx cap copy ios
          test -f ios/App/App/public/index.html || (echo "❌ index.html missing" && exit 1)
          cd ios/App
          pod install --repo-update

      - name: Fix Xcode project settings
        script: |
          cd $APP_ROOT
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/ASSETCATALOG_COMPILER_APPICON_NAME = [^;]*;/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' ios/App/App.xcodeproj/project.pbxproj
          echo "✅ CODE_SIGN_STYLE in project:"
          grep "CODE_SIGN_STYLE" ios/App/App.xcodeproj/project.pbxproj | head -6

      - name: Set up code signing
        script: |
          keychain initialize

          echo "=== DIAGNOSING ASC_PRIVATE_KEY FORMAT ==="
          KEY_LEN=${#ASC_PRIVATE_KEY}
          echo "Key length: $KEY_LEN chars"

          # Check if it starts with PEM header
          FIRST50="${ASC_PRIVATE_KEY:0:50}"
          echo "First 50 chars: $FIRST50"

          # Try base64 decode first
          if echo "$ASC_PRIVATE_KEY" | base64 --decode 2>/dev/null | grep -q "BEGIN"; then
            echo "✅ Key is base64-encoded — decoding..."
            echo "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/asc_key.p8
          else
            echo "Key appears to be raw PEM — writing with printenv..."
            printenv ASC_PRIVATE_KEY > /tmp/asc_key.p8
          fi

          echo "=== KEY FILE RESULT ==="
          echo "File size: $(wc -c < /tmp/asc_key.p8) bytes"
          echo "Line count: $(wc -l < /tmp/asc_key.p8)"
          echo "First line: $(head -1 /tmp/asc_key.p8)"
          echo "Last line:  $(tail -1 /tmp/asc_key.p8)"
          chmod 600 /tmp/asc_key.p8

          echo "=== FETCHING SIGNING FILES ==="
          app-store-connect fetch-signing-files com.knightleeron.state \
            --type IOS_APP_STORE \
            --issuer-id 792a7c6b-188d-4d18-a896-14c60eaa6c0f \
            --key-id 3XD237L64Y \
            --private-key @env:ASC_PRIVATE_KEY \
            --create
          echo "EXIT CODE: $?"

          echo "=== PROFILES ON DISK ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "⚠️ NO PROFILES FOUND"

      - name: Set build number
        script: |
          cd $APP_ROOT/ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build iOS
        script: |
          set -e
          cd $APP_ROOT/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID 3XD237L64Y \
            -authenticationKeyIssuerID 792a7c6b-188d-4d18-a896-14c60eaa6c0f \
            DEVELOPMENT_TEAM=83U7FNH93D \
            CODE_SIGN_STYLE=Automatic \
            ONLY_ACTIVE_ARCH=NO \
            clean archive 2>&1
          ls -la "$ARCHIVE_PATH" || (echo "❌ Archive not created!" && exit 1)
          find "$ARCHIVE_PATH" -name "index.html" 2>/dev/null || echo "⚠️ index.html NOT found"
          find "$ARCHIVE_PATH" -name "*.png" 2>/dev/null | grep -i icon | head -5

      - name: Export IPA
        script: |
          set -e
          PLIST_PATH="$CM_BUILD_DIR/$APP_ROOT/ios/App/ExportOptions.plist"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$PLIST_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID 3XD237L64Y \
            -authenticationKeyIssuerID 792a7c6b-188d-4d18-a896-14c60eaa6c0f
          ls -la "$EXPORT_PATH/"

    artifacts:
      - /tmp/ipa-export/*.ipa
      - /tmp/App.xcarchive/**

    publishing:
      app_store_connect:
        api_key: $ASC_PRIVATE_KEY
        key_id: $ASC_KEY_ID
        issuer_id: $ASC_KEY_ISSUER_ID
        submit_to_testflight: true
        
