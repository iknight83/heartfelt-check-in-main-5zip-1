workflows:
  ios-distribution:
    name: iOS Distribution
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.knightleeron.state
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          cd heartfelt-check-in-main
          npm install
      - name: Build web app
        script: |
          cd heartfelt-check-in-main
          npm run build
      - name: Sync iOS
        script: |
          cd heartfelt-check-in-main
          npm install @capacitor/cli @capacitor/core @capacitor/ios
          sed -i '' 's/platform :ios, .*/platform :ios, '"'"'16.0'"'"'/' ios/App/Podfile || sed -i 's/platform :ios, .*/platform :ios, '"'"'16.0'"'"'/' ios/App/Podfile
          npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-build-and-archive \
            -workspace heartfelt-check-in-main/ios/App/App.xcworkspace \
            -scheme App \
            -config Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
