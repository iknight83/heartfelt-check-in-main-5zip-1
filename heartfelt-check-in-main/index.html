  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        var isCapacitor = window.location.protocol === 'capacitor:' ||
                          (window.location.hostname === 'localhost' &&
                           navigator.userAgent.includes('iPhone'));
        var isNative = window.Capacitor && window.Capacitor.isNative;

        if (isNative || isCapacitor) {
          // Unregister any existing service workers on Capacitor
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(reg) { reg.unregister(); });
          });
        } else {
          // Only register SW on web/PWA
          navigator.serviceWorker.register('/sw.js', { scope: '/' });
        }
      }
    </script>
  </body>
